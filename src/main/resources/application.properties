server.port=8080                          # Cổng chạy ứng dụng

# Kết nối SQL Server (tên máy: localhost\SQLEXPRESS, port 1433)
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=BookStore;encrypt=false;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=123456
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA Hibernate (ddl-auto=update: tự tạo/cập nhật bảng)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Thymeleaf (cache=false để dev, reload template khi sửa)
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# Upload file (tối đa 10MB cho ảnh sản phẩm)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Tắt data.sql (dùng DataInitializer.java để seed dữ liệu)
spring.sql.init.mode=never

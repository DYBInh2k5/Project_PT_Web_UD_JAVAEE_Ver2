<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout::head(title='Lịch sử đơn hàng')"></head>
<body>
    <nav th:replace="layout::navbar"></nav>

    <div class="container my-4">
        <h2 class="section-title mb-4"><i class="fas fa-history me-2"></i>Lịch sử đơn hàng</h2>
        <div class="gothic-divider">✦ ✦ ✦</div>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <!-- Trạng thái trống -->
        <div th:if="${orders.totalElements == 0}" class="text-center py-5">
            <i class="fas fa-box-open fa-4x text-muted mb-3"></i>
            <h4>Chưa có đơn hàng nào</h4>
            <a th:href="@{/shop}" class="btn btn-primary mt-3">Mua sắm ngay</a>
        </div>

        <!-- Bảng lịch sử đơn hàng -->
        <div th:if="${orders.totalElements > 0}" class="table-responsive">
            <table class="table table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Mã đơn</th>
                        <th>Ngày đặt</th>
                        <th>Tổng tiền</th>
                        <th>Trạng thái</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="order : ${orders.content}">
                        <td><strong>#<span th:text="${order.id}"></span></strong></td>
                        <td th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}">01/01/2025</td>
                        <td class="text-danger fw-bold">
                            <th:block th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')}"></th:block> VNĐ
                        </td>
                        <td>
                            <span th:if="${order.status == 'NEW'}" class="badge bg-warning text-dark">Mới</span>
                            <span th:if="${order.status == 'SHIPPED'}" class="badge bg-info">Đã vận chuyển</span>
                            <span th:if="${order.status == 'PAID'}" class="badge bg-success">Đã thanh toán</span>
                        </td>
                        <td>
                            <a th:href="@{'/order/detail/' + ${order.id}}" class="btn btn-sm btn-outline-primary">
                                <i class="fas fa-eye"></i> Chi tiết
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Phân trang -->
        <nav th:if="${orders.totalPages > 1}" class="mt-3">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link" th:href="@{/order/history(page=${currentPage - 1})}">
                        <i class="fas fa-chevron-left"></i>
                    </a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, orders.totalPages - 1)}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link" th:href="@{/order/history(page=${i})}" th:text="${i + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${currentPage >= orders.totalPages - 1} ? 'disabled'">
                    <a class="page-link" th:href="@{/order/history(page=${currentPage + 1})}">
                        <i class="fas fa-chevron-right"></i>
                    </a>
                </li>
            </ul>
        </nav>
    </div>

    <div th:replace="layout::footer"></div>
</body>
</html>

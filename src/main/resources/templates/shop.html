<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="layout::head(title='BookStore - Sản phẩm')"></head>
<body>
    <nav th:replace="layout::navbar"></nav>

    <div class="container my-4">
        <h2 class="section-title mb-3"><i class="fas fa-crown me-2"></i>Tất cả sản phẩm</h2>

        <!-- Bộ lọc danh mục -->
        <div class="mb-4">
            <div class="d-flex flex-wrap gap-2 mb-3">
                <a th:href="@{/shop}" th:class="${selectedCategory == null} ? 'btn btn-sm btn-primary' : 'btn btn-sm btn-outline-primary'">
                    Tất cả
                </a>
                <a th:each="cat : ${categories}"
                   th:href="@{'/shop?category=' + ${cat.id}}"
                   th:class="${selectedCategory != null and selectedCategory == cat.id} ? 'btn btn-sm btn-primary' : 'btn btn-sm btn-outline-primary'"
                   th:text="${cat.name}">Category</a>
            </div>
            <!-- Form tìm kiếm & sắp xếp -->
            <form th:action="@{/shop}" method="get" class="row g-2 align-items-center">
                <div class="col-md-5">
                    <div class="input-group">
                        <input type="text" name="name" class="form-control" placeholder="Tìm kiếm sách theo tên..." th:value="${name}">
                        <button type="submit" class="btn btn-primary"><i class="fas fa-search"></i></button>
                    </div>
                </div>
                <div class="col-md-3">
                    <select name="sort" class="form-select">
                        <option value="">Sắp xếp: Mặc định</option>
                        <option value="asc" th:selected="${sort == 'asc'}">Giá: Thấp đến Cao</option>
                        <option value="desc" th:selected="${sort == 'desc'}">Giá: Cao đến Thấp</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <a th:href="@{/shop}" class="btn btn-secondary w-100"><i class="fas fa-undo"></i> Reset</a>
                </div>
            </form>
        </div>

        <div class="gothic-divider">✦ ✦ ✦</div>

        <!-- Danh sách sản phẩm -->
        <div class="row">
            <div th:if="${products.totalElements == 0}" class="col-12">
                <div class="alert alert-info text-center py-4">
                    <i class="fas fa-search fa-2x mb-2" style="color: var(--blood-red);"></i>
                    <p class="mb-0">Không tìm thấy sản phẩm nào phù hợp.</p>
                </div>
            </div>
            <div class="col-lg-3 col-md-4 col-sm-6 mb-4" th:each="product : ${products.content}">
                <div class="card product-card h-100">
                    <div class="product-img-container position-relative">
                        <img th:if="${product.image != null}" th:src="@{'/images/' + ${product.image}}"
                             class="card-img-top" th:alt="${product.name}">
                        <div th:if="${product.image == null}" class="d-flex align-items-center justify-content-center h-100 text-muted">
                            <i class="fas fa-book fa-4x"></i>
                        </div>
                        <span th:if="${product.stock > 0 and product.stock <= 10}"
                              class="badge position-absolute top-0 end-0 m-2" style="background: #cc8400;">
                            <i class="fas fa-fire"></i> Sắp hết
                        </span>
                        <span th:if="${product.stock == 0}"
                              class="badge bg-danger position-absolute top-0 end-0 m-2">
                            <i class="fas fa-times-circle"></i> Hết hàng
                        </span>
                    </div>
                    <div class="card-body d-flex flex-column">
                        <h6 class="card-title text-truncate" th:text="${product.name}">Sách</h6>
                        <p class="card-text" style="color: var(--silver); font-size: 0.8rem;">
                            <i class="fas fa-user-pen me-1"></i><span th:text="${product.author}">Tác giả</span>
                        </p>
                        <p class="card-text" style="color: rgba(192,192,192,0.6); font-size: 0.8rem; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;"
                           th:text="${product.description}">Mô tả</p>
                        <div class="mt-auto">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span class="fw-bold" style="color: var(--blood-red); font-size: 1.1rem;">
                                    <th:block th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')}"></th:block>₫
                                </span>
                                <span th:if="${product.stock > 0}" style="color: var(--forest-green); font-size: 0.75rem;">
                                    <i class="fas fa-check-circle"></i> Còn hàng
                                </span>
                            </div>
                            <form th:action="@{'/cart/add/' + ${product.id}}" method="post" class="d-grid">
                                <button type="submit" class="btn btn-primary btn-sm" sec:authorize="isAuthenticated()"
                                        th:disabled="${product.stock == 0}">
                                    <i class="fas fa-cart-plus"></i> Thêm vào giỏ
                                </button>
                                <a th:href="@{/login}" class="btn btn-primary btn-sm" sec:authorize="!isAuthenticated()">
                                    <i class="fas fa-cart-plus"></i> Thêm vào giỏ
                                </a>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Phân trang -->
        <nav th:if="${products.totalPages > 0}" class="mt-4">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link" th:href="@{/shop(page=${currentPage - 1}, name=${name}, category=${selectedCategory}, sort=${sort})}">
                        <i class="fas fa-chevron-left"></i>
                    </a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, products.totalPages - 1)}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link" th:href="@{/shop(page=${i}, name=${name}, category=${selectedCategory}, sort=${sort})}"
                       th:text="${i + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${currentPage >= products.totalPages - 1} ? 'disabled'">
                    <a class="page-link" th:href="@{/shop(page=${currentPage + 1}, name=${name}, category=${selectedCategory}, sort=${sort})}">
                        <i class="fas fa-chevron-right"></i>
                    </a>
                </li>
            </ul>
        </nav>
    </div>

    <div th:replace="layout::footer"></div>
</body>
</html>

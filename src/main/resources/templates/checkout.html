<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout::head(title='Thanh toán')"></head>
<body>
    <nav th:replace="layout::navbar"></nav>

    <div class="container my-4">
        <h2 class="mb-4"><i class="fas fa-credit-card"></i> Thanh toán</h2>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <div class="row">
            <div class="col-md-7">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Thông tin giao hàng</h5>
                        <form th:action="@{/cart/checkout}" method="post">
                            <div class="mb-3">
                                <label class="form-label">Người nhận <span class="text-danger">*</span></label>
                                <input type="text" name="recipientName" class="form-control"
                                       th:value="${user.fullName}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Số điện thoại <span class="text-danger">*</span></label>
                                <input type="text" name="phone" class="form-control"
                                       th:value="${user.phone}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Địa chỉ <span class="text-danger">*</span></label>
                                <textarea name="address" class="form-control" rows="3" required
                                          th:text="${user.address}"></textarea>
                            </div>
                            <button type="submit" class="btn btn-success btn-lg w-100">
                                <i class="fas fa-check"></i> Xác nhận đặt hàng
                            </button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-md-5">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Đơn hàng của bạn</h5>
                        <div th:each="item : ${cart.items}" class="d-flex justify-content-between mb-2">
                            <span th:text="${item.product.name} + ' x' + ${item.quantity}">Sách x1</span>
                            <span class="text-danger fw-bold">
                                <th:block th:text="${#numbers.formatDecimal(item.product.price * item.quantity, 0, 'COMMA', 0, 'POINT')}"></th:block> VNĐ
                            </span>
                        </div>
                        <hr>
                        <div class="d-flex justify-content-between">
                            <strong>Tổng cộng:</strong>
                            <strong class="text-danger fs-5">
                                <th:block th:text="${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT')}"></th:block> VNĐ
                            </strong>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="layout::footer"></div>
</body>
</html>

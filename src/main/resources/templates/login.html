<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout::head(title='Đăng nhập')"></head>
<body>
    <nav th:replace="layout::navbar"></nav>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="auth-card">
                    <h3><i class="fas fa-sign-in-alt me-2"></i>Đăng nhập</h3>

                        <div th:if="${param.success}" class="alert alert-success">
                            Đăng ký thành công! Vui lòng đăng nhập.
                        </div>
                        <div th:if="${param.error}" class="alert alert-danger">
                            Sai tên đăng nhập hoặc mật khẩu.
                        </div>
                        <div th:if="${param.accessDenied}" class="alert alert-warning">
                            Bạn không có quyền truy cập trang này.
                        </div>

                        <!-- Form đăng nhập -->
                        <form th:action="@{/login}" method="post">
                            <div class="mb-3">
                                <label class="form-label">Tên đăng nhập</label>
                                <input type="text" name="username" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Mật khẩu</label>
                                <input type="password" name="password" class="form-control" required>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-sign-in-alt"></i> Đăng nhập
                                </button>
                            </div>
                        </form>

                        <!-- Link đăng ký -->
                        <div class="text-center mt-3">
                            <p>Chưa có tài khoản? <a th:href="@{/register}">Đăng ký ngay</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="layout::footer"></div>
</body>
</html>

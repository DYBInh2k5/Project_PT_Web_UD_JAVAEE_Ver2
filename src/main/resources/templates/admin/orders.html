<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout::head(title='Admin - Đơn hàng')"></head>
<body>
    <nav th:replace="layout::navbar"></nav>

    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar">
                <h5><i class="fas fa-tachometer-alt me-2"></i>Quản trị</h5>
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin}"><i class="fas fa-chart-simple"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/products}"><i class="fas fa-book"></i> Sản phẩm</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/orders}"><i class="fas fa-truck"></i> Đơn hàng</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/orders/revenue}"><i class="fas fa-dollar-sign"></i> Doanh thu</a></li>
                </ul>
            </div>
            <div class="col-md-10 p-4">
                <h2 class="section-title mb-4"><i class="fas fa-truck me-2"></i>Quản lý đơn hàng</h2>

                <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

                <div class="card mt-3">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>Mã đơn</th>
                                        <th>Khách hàng</th>
                                        <th>Ngày đặt</th>
                                        <th>Tổng tiền</th>
                                        <th>Trạng thái</th>
                                        <th>Thao tác</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="order : ${orders.content}">
                                        <td><strong>#<span th:text="${order.id}"></span></strong></td>
                                        <td th:text="${order.user.fullName}"></td>
                                        <td th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}"></td>
                                        <td class="text-danger fw-bold">
                                            <th:block th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')}"></th:block> VNĐ
                                        </td>
                                        <td>
                                            <span th:if="${order.status == 'NEW'}" class="badge bg-warning text-dark">Mới</span>
                                            <span th:if="${order.status == 'SHIPPED'}" class="badge bg-info">Đã vận chuyển</span>
                                            <span th:if="${order.status == 'PAID'}" class="badge bg-success">Đã thanh toán</span>
                                        </td>
                                        <td>
                                            <form th:action="@{/admin/orders/update-status}" method="post" class="d-flex gap-1">
                                                <input type="hidden" name="orderId" th:value="${order.id}">
                                                <select name="status" class="form-select form-select-sm" style="width: auto;">
                                                    <option value="NEW" th:selected="${order.status == 'NEW'}">Mới</option>
                                                    <option value="SHIPPED" th:selected="${order.status == 'SHIPPED'}">Đã vận chuyển</option>
                                                    <option value="PAID" th:selected="${order.status == 'PAID'}">Đã thanh toán</option>
                                                </select>
                                                <button type="submit" class="btn btn-sm btn-primary">
                                                    <i class="fas fa-sync-alt"></i>
                                                </button>
                                            </form>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                        <nav th:if="${orders.totalPages > 1}">
                            <ul class="pagination justify-content-center">
                                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                                    <a class="page-link" th:href="@{/admin/orders(page=${currentPage - 1})}">
                                        <i class="fas fa-chevron-left"></i>
                                    </a>
                                </li>
                                <li class="page-item" th:each="i : ${#numbers.sequence(0, orders.totalPages - 1)}"
                                    th:classappend="${i == currentPage} ? 'active'">
                                    <a class="page-link" th:href="@{/admin/orders(page=${i})}" th:text="${i + 1}">1</a>
                                </li>
                                <li class="page-item" th:classappend="${currentPage >= orders.totalPages - 1} ? 'disabled'">
                                    <a class="page-link" th:href="@{/admin/orders(page=${currentPage + 1})}">
                                        <i class="fas fa-chevron-right"></i>
                                    </a>
                                </li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="layout::footer"></div>
</body>
</html>

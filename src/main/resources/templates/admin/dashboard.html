<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="layout::head(title='Admin - Dashboard')"></head>
<body>
    <nav th:replace="layout::navbar"></nav>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar quản trị -->
            <div class="col-md-2 sidebar">
                <h5><i class="fas fa-tachometer-alt me-2"></i>Quản trị</h5>
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/admin}">
                            <i class="fas fa-chart-simple"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/admin/products}">
                            <i class="fas fa-book"></i> Sản phẩm
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/admin/orders}">
                            <i class="fas fa-truck"></i> Đơn hàng
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/admin/orders/revenue}">
                            <i class="fas fa-dollar-sign"></i> Doanh thu
                        </a>
                    </li>
                </ul>
            </div>
            <div class="col-md-10 p-4">
                <h2 class="section-title mb-4"><i class="fas fa-chart-simple me-2"></i>Dashboard</h2>
                <!-- Thống kê dashboard -->
                <div class="row mt-4">
                    <div class="col-md-4 mb-3">
                        <div class="stat-card text-center">
                            <div class="stat-icon"><i class="fas fa-book"></i></div>
                            <div class="stat-number" th:text="${products != null} ? ${products.totalElements} : '0'">0</div>
                            <div class="stat-label">Sản phẩm</div>
                            <a th:href="@{/admin/products}" class="btn btn-outline-primary btn-sm mt-3">Quản lý</a>
                        </div>
                    </div>
                    <div class="col-md-4 mb-3">
                        <div class="stat-card text-center">
                            <div class="stat-icon"><i class="fas fa-truck"></i></div>
                            <div class="stat-number">6</div>
                            <div class="stat-label">Đơn hàng</div>
                            <a th:href="@{/admin/orders}" class="btn btn-outline-primary btn-sm mt-3">Quản lý</a>
                        </div>
                    </div>
                    <div class="col-md-4 mb-3">
                        <div class="stat-card text-center">
                            <div class="stat-icon"><i class="fas fa-dollar-sign"></i></div>
                            <div class="stat-number">136.0K</div>
                            <div class="stat-label">Doanh thu</div>
                            <a th:href="@{/admin/orders/revenue}" class="btn btn-outline-primary btn-sm mt-3">Xem</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="layout::footer"></div>
</body>
</html>

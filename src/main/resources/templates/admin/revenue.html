<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout::head(title='Admin - Doanh thu')"></head>
<body>
    <nav th:replace="layout::navbar"></nav>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar quản trị -->
            <div class="col-md-2 sidebar">
                <h5><i class="fas fa-tachometer-alt me-2"></i>Quản trị</h5>
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin}"><i class="fas fa-chart-simple"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/products}"><i class="fas fa-book"></i> Sản phẩm</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/orders}"><i class="fas fa-truck"></i> Đơn hàng</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/orders/revenue}"><i class="fas fa-dollar-sign"></i> Doanh thu</a></li>
                </ul>
            </div>
            <div class="col-md-10 p-4">
                <h2 class="section-title mb-4"><i class="fas fa-dollar-sign me-2"></i>Xem doanh thu</h2>

                <div class="card mt-3">
                    <div class="card-body">
                        <!-- Bộ lọc ngày xem doanh thu -->
                        <form th:action="@{/admin/orders/revenue}" method="post" class="row g-2">
                            <div class="col-md-4">
                                <label class="form-label">Chọn ngày</label>
                                <input type="date" name="date" class="form-control" th:value="${selectedDate}" required>
                            </div>
                            <div class="col-md-2 d-flex align-items-end">
                                <button type="submit" class="btn btn-primary w-100">
                                    <i class="fas fa-search"></i> Xem
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Thống kê doanh thu -->
                <div th:if="${revenue != null}" class="mt-4">
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <div class="card text-white bg-info">
                                <div class="card-body text-center">
                                    <h6>Doanh thu ngày</h6>
                                    <h4 class="fw-bold">
                                        <th:block th:text="${#numbers.formatDecimal(revenue.dayRevenue, 0, 'COMMA', 0, 'POINT')}"></th:block> VNĐ
                                    </h4>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4 mb-3">
                            <div class="card text-white bg-primary">
                                <div class="card-body text-center">
                                    <h6>Doanh thu tháng</h6>
                                    <h4 class="fw-bold">
                                        <th:block th:text="${#numbers.formatDecimal(revenue.monthRevenue, 0, 'COMMA', 0, 'POINT')}"></th:block> VNĐ
                                    </h4>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4 mb-3">
                            <div class="card text-white bg-success">
                                <div class="card-body text-center">
                                    <h6>Doanh thu năm</h6>
                                    <h4 class="fw-bold">
                                        <th:block th:text="${#numbers.formatDecimal(revenue.yearRevenue, 0, 'COMMA', 0, 'POINT')}"></th:block> VNĐ
                                    </h4>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Biểu đồ doanh thu -->
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">Biểu đồ doanh thu 7 ngày</h5>
                            <canvas id="revenueChart" style="max-height: 400px;"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:if="${revenue != null}">
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof Chart === 'undefined') {
                console.error('Chart.js not loaded!');
                return;
            }
            var ctx = document.getElementById('revenueChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: [
                        <th:block th:each="item, iter : ${revenue.dailyRevenueList}">
                            '<th:block th:text="${item.label}"></th:block>'<th:block th:if="${!iter.last}">, </th:block>
                        </th:block>
                    ],
                    datasets: [{
                        label: 'Doanh thu (VNĐ)',
                        data: [
                            <th:block th:each="item, iter : ${revenue.dailyRevenueList}">
                                <th:block th:text="${item.revenue}"></th:block><th:block th:if="${!iter.last}">, </th:block>
                            </th:block>
                        ],
                        backgroundColor: 'rgba(54, 162, 235, 0.7)',
                        borderColor: 'rgba(54, 162, 235, 1)',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                callback: function(value) {
                                    return value.toLocaleString('vi-VN') + ' VNĐ';
                                }
                            }
                        }
                    },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return context.parsed.y.toLocaleString('vi-VN') + ' VNĐ';
                                }
                            }
                        }
                    }
                }
            });
        });
    </script>

    <div th:replace="layout::footer"></div>
</body>
</html>

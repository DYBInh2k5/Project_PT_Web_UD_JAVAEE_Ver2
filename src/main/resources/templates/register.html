<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout::head(title='Đăng ký')"></head>
<body>
    <nav th:replace="layout::navbar"></nav>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="auth-card">
                    <h3><i class="fas fa-user-plus me-2"></i>Đăng ký</h3>

                        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                        <!-- Form đăng ký -->
                        <form th:action="@{/register}" th:object="${user}" method="post">
                            <div class="mb-3">
                                <label class="form-label">Tên đăng nhập <span class="text-danger">*</span></label>
                                <input type="text" th:field="*{username}" class="form-control" required>
                                <div th:if="${#fields.hasErrors('username')}" class="text-danger small" th:errors="*{username}"></div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Mật khẩu <span class="text-danger">*</span></label>
                                <input type="password" th:field="*{password}" class="form-control" required>
                                <div th:if="${#fields.hasErrors('password')}" class="text-danger small" th:errors="*{password}"></div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Họ tên <span class="text-danger">*</span></label>
                                <input type="text" th:field="*{fullName}" class="form-control" required>
                                <div th:if="${#fields.hasErrors('fullName')}" class="text-danger small" th:errors="*{fullName}"></div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" th:field="*{email}" class="form-control">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Số điện thoại</label>
                                <input type="text" th:field="*{phone}" class="form-control">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Địa chỉ</label>
                                <textarea th:field="*{address}" class="form-control" rows="2"></textarea>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-user-plus"></i> Đăng ký
                                </button>
                            </div>
                        </form>

                        <!-- Link đăng nhập -->
                        <div class="text-center mt-3">
                            <p>Đã có tài khoản? <a th:href="@{/login}">Đăng nhập</a></p>
                        </div>
                    </div>
            </div>
        </div>
    </div>

    <div th:replace="layout::footer"></div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout::head(title='Chi tiết đơn hàng')"></head>
<body>
    <nav th:replace="layout::navbar"></nav>

    <div class="container my-4">
        <h2 class="mb-4"><i class="fas fa-file-invoice"></i> Chi tiết đơn hàng #<span th:text="${order.id}"></span></h2>

        <div class="row">
            <div class="col-md-6">
                <div class="card mb-3">
                    <div class="card-body">
                        <h5 class="card-title">Thông tin đơn hàng</h5>
                        <!-- Thông tin đơn hàng -->
                        <table class="table table-sm">
                            <tr>
                                <td>Ngày đặt:</td>
                                <td class="fw-bold" th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}"></td>
                            </tr>
                            <tr>
                                <td>Trạng thái:</td>
                                <td>
                                    <span th:if="${order.status == 'NEW'}" class="badge bg-warning text-dark">Mới</span>
                                    <span th:if="${order.status == 'SHIPPED'}" class="badge bg-info">Đã vận chuyển</span>
                                    <span th:if="${order.status == 'PAID'}" class="badge bg-success">Đã thanh toán</span>
                                </td>
                            </tr>
                            <tr>
                                <td>Tổng tiền:</td>
                                <td class="text-danger fw-bold fs-5">
                                    <th:block th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')}"></th:block> VNĐ
                                </td>
                            </tr>
                        </table>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card mb-3">
                    <div class="card-body">
                        <h5 class="card-title">Thông tin giao hàng</h5>
                        <!-- Thông tin giao hàng -->
                        <table class="table table-sm">
                            <tr>
                                <td>Người nhận:</td>
                                <td class="fw-bold" th:text="${order.recipientName}"></td>
                            </tr>
                            <tr>
                                <td>SĐT:</td>
                                <td th:text="${order.phone}"></td>
                            </tr>
                            <tr>
                                <td>Địa chỉ:</td>
                                <td th:text="${order.address}"></td>
                            </tr>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Danh sách sản phẩm</h5>
                <!-- Danh sách sản phẩm -->
                <table class="table">
                    <thead>
                        <tr>
                            <th>Sản phẩm</th>
                            <th>Đơn giá</th>
                            <th>Số lượng</th>
                            <th>Thành tiền</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="detail : ${order.orderDetails}">
                            <td th:text="${detail.product.name}">Sách</td>
                            <td>
                                <th:block th:text="${#numbers.formatDecimal(detail.price, 0, 'COMMA', 0, 'POINT')}"></th:block> VNĐ
                            </td>
                            <td th:text="${detail.quantity}">1</td>
                            <td class="text-danger fw-bold">
                                <th:block th:text="${#numbers.formatDecimal(detail.price * detail.quantity, 0, 'COMMA', 0, 'POINT')}"></th:block> VNĐ
                            </td>
                        </tr>
                    </tbody>
                    <tfoot>
                        <tr class="table-active">
                            <td colspan="3" class="text-end fw-bold">Tổng cộng:</td>
                            <td class="text-danger fw-bold fs-5">
                                <th:block th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')}"></th:block> VNĐ
                            </td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>

        <div class="mt-3">
            <a th:href="@{/order/history}" class="btn btn-outline-primary">
                <i class="fas fa-arrow-left"></i> Quay lại
            </a>
        </div>
    </div>

    <div th:replace="layout::footer"></div>
</body>
</html>
